<!DOCTYPE html>
<html>
<head>
<title>Agent X Battle - Login</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
 margin:0;
 font-family:sans-serif;
 background:linear-gradient(180deg,#0f0c29,#302b63,#24243e);
 color:white;
 display:flex;
 justify-content:center;
 align-items:center;
 height:100vh;
}

.box{
 background:#111;
 padding:25px;
 border-radius:15px;
 box-shadow:0 0 20px #ff00ff;
 width:300px;
}

input{
 width:100%;
 padding:10px;
 margin:10px 0;
 border:none;
 border-radius:10px;
 background:#222;
 color:white;
}

button{
 width:100%;
 padding:12px;
 border:none;
 border-radius:10px;
 background:linear-gradient(45deg,#ff416c,#ff4b2b);
 color:white;
}
</style>
</head>

<body>

<div class="box">
<h2>🔥 Agent X Battle</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script>

// 🔥 Firebase Config
const firebaseConfig = {
 apiKey: "AIzaSyBWJuXY8A2jKKBrW4CnLdfU3Spx2U4GUU0",
 authDomain: "battle-x-agent.firebaseapp.com",
 databaseURL: "https://battle-x-agent-default-rtdb.firebaseio.com",
};

firebase.initializeApp(firebaseConfig);

// 🔐 LOGIN FUNCTION
function login(){
 let email = document.getElementById("email").value;
 let pass = document.getElementById("pass").value;

 firebase.auth().signInWithEmailAndPassword(email, pass)
 .then((userCredential)=>{

   let user = userCredential.user;

   // ✅ USER SAVE
   firebase.database().ref("users/"+user.uid).once("value")
   .then((snap)=>{

     if(!snap.exists()){
       firebase.database().ref("users/"+user.uid).set({
         email: user.email,
         wallet: 100,
         banned: false
       });
     }

     // 🚫 BAN CHECK
     if(snap.val() && snap.val().banned){
       alert("🚫 You are banned!");
       firebase.auth().signOut();
       return;
     }

     // 🔐 ADMIN CHECK
     if(email === "admin@battle.com"){
       window.location.href = "admin.html";
     } else {
       window.location.href = "home.html";
     }

   });

 })
 .catch((error)=>{
   alert("Login Failed ❌");
 });
}

</script>

</body>
</html>
